<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow w-96">

    <h2 class="text-2xl font-bold mb-6 text-center">Signup</h2>

    <form method="POST" action="/register" class="space-y-4">
        <input type="text" name="name" placeholder="Name" class="w-full p-2 border rounded-lg">
        <input type="email" name="email" placeholder="Email" class="w-full p-2 border rounded-lg">
        <input type="password" name="password" placeholder="Password" class="w-full p-2 border rounded-lg">
        <input type="number" name="salary" placeholder="Salary per day" class="w-full p-2 border rounded-lg">

        <button class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">
            Register
        </button>
    </form>

</div>

</body>
</html>
