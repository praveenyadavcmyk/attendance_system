<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto mt-10">

    <!-- Header -->
    <h1 class="text-3xl font-bold mb-5">Employee Dashboard</h1>
    <h2 class="text-lg text-gray-600 mb-8">{{ month_name }}</h2>

    <!-- Cards -->
    <div class="grid grid-cols-2 gap-6">

        <div class="bg-white p-6 rounded-2xl shadow">
            <h3 class="text-gray-500">This Month Present Days</h3>
            <p class="text-2xl font-bold">{{ present_days }}</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow">
            <h3 class="text-gray-500">This Month Salary</h3>
            <p class="text-2xl font-bold">₹{{ total_salary }}</p>
        </div>

    </div>

    <!-- Buttons -->
    <div class="mt-8 flex gap-4">

        <button onclick="markAttendance()"
            class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
            📍 Mark Attendance
        </button>

        <a href="/history">
            <button class="bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600">
                📊 My History
            </button>
        </a>

        <a href="/admin">
            <button class="bg-gray-800 text-white px-6 py-2 rounded-lg hover:bg-gray-900">
                🛠 Admin
            </button>
        </a>

    </div>

</div>

<script>
function markAttendance() {
    navigator.geolocation.getCurrentPosition(function(position) {
        fetch('/mark_location', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                lat: position.coords.latitude,
                lon: position.coords.longitude
            })
        })
        .then(res => res.text())
        .then(data => {
            alert(data);
            location.reload();
        });
    });
}
</script>

</body>
</html>
