<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        #map {
            height: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between mb-3">
        <h2>📊 Employee Dashboard</h2>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <!-- Summary Cards -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card p-3 text-center">
                <h4>Present Days</h4>
                <h2>{{ days }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 text-center">
                <h4>Total Salary</h4>
                <h2>₹{{ salary }}</h2>
            </div>
        </div>
    </div>

    <!-- Attendance Button -->
    <div class="text-center mb-4">
        <button class="btn btn-primary btn-lg" onclick="markAttendance()">
            📍 Mark Attendance
        </button>
    </div>

    <!-- Map -->
    <div class="card p-3 mb-4">
        <h5>📍 Your Location</h5>
        <div id="map"></div>
    </div>

    <!-- Attendance Table -->
    <div class="card p-3">
        <h5>📅 Monthly Attendance</h5>
        <table class="table table-bordered mt-3">
            <tr>
                <th>Date</th>
                <th>Status</th>
            </tr>

            {% for row in data %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;

function initMap(lat, lon) {
    map = L.map('map').setView([lat, lon], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'Map data © OpenStreetMap'
    }).addTo(map);

    // User marker
    L.marker([lat, lon]).addTo(map)
        .bindPopup("You are here")
        .openPopup();

    // Office location (same as backend)
    const officeLat = 28.36928653724523;
    const officeLon = 77.5507754219189;

    L.marker([officeLat, officeLon]).addTo(map)
        .bindPopup("Office Location");

    // Radius circle
    L.circle([officeLat, officeLon], {
        radius: 100,
        color: 'green'
    }).addTo(map);
}

// Get location on load
navigator.geolocation.getCurrentPosition(function(position) {
    initMap(position.coords.latitude, position.coords.longitude);
});

function markAttendance() {
    navigator.geolocation.getCurrentPosition(function(position) {
        fetch("/mark_location", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lat: position.coords.latitude,
                lon: position.coords.longitude
            })
        })
        .then(res => res.text())
        .then(data => {
            alert(data);
            location.reload();
        });
    });
}
</script>

</body>
</html>
